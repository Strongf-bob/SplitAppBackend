name: splitapp-backend

services:
  api:
    build:
      context: .
    image: splitapp-backend:local
    container_name: splitapp-backend-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGODB_HOST: mongo
      MONGODB_PORT: "27017"
    ports:
      - "${HOST_PORT:-8080}:8000"
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/ping', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - backend

  mongo:
    image: mongo:7
    container_name: splitapp-backend-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend

volumes:
  mongo-data:

networks:
  backend:
    name: splitapp-backend
