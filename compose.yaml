name: splitapp-backend

services:
  api:
    build:
      context: .
    image: splitapp-backend:local
    container_name: splitapp-backend-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGODB_HOST: mongo
      MONGODB_PORT: "27017"
    ports:
      - "${HOST_PORT:-8080}:8000"
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/ping', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - backend

  mongo:
    image: mongo:7
    container_name: splitapp-backend-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: splitapp-backend-prometheus
    restart: unless-stopped
    env_file:
      - .env
    entrypoint:
      - "sh"
      - "-ec"
    command:
      - |
        test -n "$${METRICS_ACCESS_TOKEN:-}"
        escaped_token=$$(printf '%s' "$${METRICS_ACCESS_TOKEN}" | sed 's/[\/&]/\\&/g')
        sed "s/__METRICS_ACCESS_TOKEN__/$${escaped_token}/g" /etc/prometheus/prometheus.yml.template > /tmp/prometheus.yml
        exec /bin/prometheus \
          --config.file=/tmp/prometheus.yml \
          --storage.tsdb.path=/prometheus \
          --storage.tsdb.retention.time=15d \
          --web.enable-lifecycle
    volumes:
      - ./deploy/observability/prometheus.yml:/etc/prometheus/prometheus.yml.template:ro
      - prometheus-data:/prometheus
    depends_on:
      api:
        condition: service_healthy
    networks:
      - backend

  mongodb-exporter:
    image: percona/mongodb_exporter:0.43.1
    container_name: splitapp-backend-mongodb-exporter
    restart: unless-stopped
    command:
      - "--mongodb.uri=mongodb://mongo:27017"
      - "--collector.diagnosticdata"
      - "--collector.replicasetstatus"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - backend

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: splitapp-backend-cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    networks:
      - backend

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: splitapp-backend-node-exporter
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(dev|proc|sys|run|var/lib/docker/.+|var/lib/containers/.+)($$|/)"
    pid: host
    volumes:
      - /:/host:ro,rslave
    networks:
      - backend

  loki:
    image: grafana/loki:3.3.2
    container_name: splitapp-backend-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki.yml"]
    volumes:
      - ./deploy/observability/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    networks:
      - backend

  alloy:
    image: grafana/alloy:v1.5.1
    container_name: splitapp-backend-alloy
    restart: unless-stopped
    command: ["run", "/etc/alloy/config.alloy"]
    volumes:
      - ./deploy/observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - backend

  grafana:
    image: grafana/grafana:11.4.0
    container_name: splitapp-backend-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    ports:
      - "${GRAFANA_BIND_ADDRESS:-127.0.0.1}:${GRAFANA_HOST_PORT:-3001}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - backend

  grafana-public-proxy:
    image: caddy:2.8.4
    container_name: splitapp-backend-grafana-public-proxy
    restart: unless-stopped
    profiles:
      - public-grafana
    environment:
      GRAFANA_PUBLIC_DOMAIN: "${GRAFANA_PUBLIC_DOMAIN:-}"
    ports:
      - "${GRAFANA_PUBLIC_HTTP_PORT:-80}:80"
      - "${GRAFANA_PUBLIC_HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/observability/grafana/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - grafana
    networks:
      - backend

volumes:
  mongo-data:
  prometheus-data:
  loki-data:
  grafana-data:
  caddy-data:
  caddy-config:

networks:
  backend:
    name: splitapp-backend
