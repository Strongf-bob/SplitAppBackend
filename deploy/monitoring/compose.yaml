name: splitapp-monitoring

services:
  loki:
    image: grafana/loki:3.3.2
    restart: unless-stopped
    command: ["-config.file=/etc/loki/config.yml"]
    ports:
      - "127.0.0.1:13101:3100"
    volumes:
      - ./loki.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    networks: [monitoring]

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    env_file: .env
    entrypoint: ["sh", "-ec"]
    command:
      - |
        test -n "$${METRICS_ACCESS_TOKEN:-}"
        escaped_token=$$(printf '%s' "$${METRICS_ACCESS_TOKEN}" | sed 's/[\/&]/\\&/g')
        sed "s/__METRICS_ACCESS_TOKEN__/$${escaped_token}/g" /etc/prometheus/prometheus.yml.template > /tmp/prometheus.yml
        exec /bin/prometheus --config.file=/tmp/prometheus.yml --storage.tsdb.retention.time=30d
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml.template:ro
      - prometheus-data:/prometheus
    networks: [monitoring]

  alertmanager:
    image: prom/alertmanager:v0.28.1
    restart: unless-stopped
    command: ["--config.file=/etc/alertmanager/alertmanager.yml"]
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks: [monitoring]

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    env_file: .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks: [monitoring]

  log-reviewer:
    build: ../../monitoring/log_reviewer
    restart: unless-stopped
    env_file: .env
    networks: [monitoring]

  caddy:
    image: caddy:2.8.4
    restart: unless-stopped
    env_file: .env
    ports: ["443:443"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks: [monitoring]

volumes:
  loki-data:
  prometheus-data:
  grafana-data:
  caddy-data:
  caddy-config:

networks:
  monitoring:
