global:
  scrape_interval: 30s
scrape_configs:
  - job_name: splitapp-backend
    metrics_path: /api/metrics
    authorization:
      type: Bearer
      credentials: __METRICS_ACCESS_TOKEN__
    static_configs:
      - targets: ["splitapp-production-metrics-tunnel:18080"]

  - job_name: log-reviewer
    static_configs:
      - targets: ["log-reviewer:8080"]
