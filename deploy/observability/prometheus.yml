global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: splitapp-backend
    metrics_path: /api/metrics
    authorization:
      type: Bearer
      credentials: __METRICS_ACCESS_TOKEN__
    static_configs:
      - targets:
          - api:8000

  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: mongodb-exporter
    static_configs:
      - targets:
          - mongodb-exporter:9216

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100
