name: Diagnose Production Grafana

on:
  pull_request:
    paths:
      - ".github/workflows/diagnose-production-grafana.yml"

permissions:
  contents: read

jobs:
  diagnose:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
    steps:
      - name: Validate diagnostics access
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_SSH_KEY"
          test -n "$DEPLOY_PATH"

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Inspect Grafana and reverse proxy
        run: |
          ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' bash -s" <<'REMOTE'
          set -eu
          cd "$DEPLOY_PATH"

          echo "host=$(hostname) user=$(id -un)"
          echo "docker_context=$(docker context show 2>/dev/null || echo unavailable)"

          echo "--- relevant environment ---"
          for key in GRAFANA_BIND_ADDRESS GRAFANA_HOST_PORT GRAFANA_PUBLIC_DOMAIN GRAFANA_PUBLIC_PROXY_MODE GRAFANA_PUBLIC_HTTPS_PORT; do
            value=$(sed -n "s/^${key}=//p" .env | tail -1)
            echo "${key}=${value:-<unset>}"
          done

          echo "--- listeners ---"
          ss -ltnp 2>/dev/null | grep -E ':(80|443|3001|8080)[[:space:]]' || true

          echo "--- proxy processes ---"
          ps -eo user,pid,comm,args | grep -E '[c]addy|[n]ginx|[t]raefik|[a]pache|[h]aproxy' || true

          echo "--- compose services ---"
          docker ps --format '{{.Names}}\t{{.Status}}\t{{.Ports}}' | grep -E 'splitapp|grafana|caddy|nginx|traefik' || true

          echo "--- user services ---"
          systemctl --user --no-pager --type=service --state=running 2>/dev/null | grep -E 'splitapp|grafana|caddy|nginx|traefik|alloy' || true

          echo "--- readable proxy config paths ---"
          for candidate in "$HOME/Caddyfile" "$HOME/.config/caddy/Caddyfile" /etc/caddy/Caddyfile /etc/nginx/nginx.conf; do
            if [ -r "$candidate" ]; then
              echo "$candidate"
              grep -nE 'split-app|grafana|reverse_proxy|proxy_pass|listen' "$candidate" || true
            fi
          done

          echo "--- local health ---"
          curl -sS --max-time 5 -o /tmp/grafana-health -w 'grafana_http=%{http_code}\n' http://127.0.0.1:3001/api/health || true
          head -c 300 /tmp/grafana-health 2>/dev/null || true
          echo
          curl -sS --max-time 5 -o /dev/null -w 'api_http=%{http_code}\n' http://127.0.0.1:8080/api/ping || true
          REMOTE
