name: Sync GitHub Wiki

on:
  workflow_dispatch:
  schedule:
    - cron: "15 3 * * *"
  push:
    branches:
      - main
    paths:
      - "docs/wiki/**"
      - "openapi.yaml"
      - "README.md"
      - "docs/*.md"
      - "app/**/*.py"

permissions:
  contents: write

jobs:
  sync:
    name: Sync docs/wiki to GitHub Wiki
    runs-on: ubuntu-latest
    steps:
      - name: Checkout backend
        uses: actions/checkout@v4

      - name: Clone wiki repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git" wiki

      - name: Copy wiki pages
        run: |
          set -euo pipefail
          find wiki -mindepth 1 -maxdepth 1 -type f -name '*.md' -delete
          cp docs/wiki/*.md wiki/

      - name: Commit and push if changed
        working-directory: wiki
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add *.md
          if git diff --cached --quiet; then
            echo "Wiki is already up to date."
            exit 0
          fi
          git commit -m "docs: sync backend wiki"
          git push
