name: Backend CI/CD

on:
  pull_request:
  push:
    branches:
      - main
      - "strongf/**"

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ruff
        run: make lint

      - name: Check formatting
        run: make format-check

      - name: Audit dependencies
        run: make security-audit

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: make test

  llm-smoke:
    name: LLM Smoke
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    env:
      SPLITIK_LLM_SMOKE_TEST: "1"
      SPLITIK_LLM_BASE_URL: ${{ secrets.SPLITIK_LLM_BASE_URL || secrets.OCR_LLM_URL }}
      SPLITIK_LLM_API_KEY: ${{ secrets.SPLITIK_LLM_API_KEY || secrets.OCR_LLM_AUTH_TOKEN }}
      SPLITIK_PRIMARY_MODEL: ${{ secrets.SPLITIK_PRIMARY_MODEL || secrets.OCR_LLM_MODEL }}
      SPLITIK_FAST_CHAT_MODEL: ${{ secrets.SPLITIK_FAST_CHAT_MODEL || vars.SPLITIK_FAST_CHAT_MODEL || 'deepseek-v4-flash' }}
      SPLITIK_INTENT_MODEL: ${{ secrets.SPLITIK_INTENT_MODEL || vars.SPLITIK_INTENT_MODEL || 'deepseek-v4-flash' }}
      SPLITIK_VERIFICATION_MODEL: ${{ secrets.SPLITIK_VERIFICATION_MODEL }}
      SPLITIK_ESCALATION_MODEL: ${{ secrets.SPLITIK_ESCALATION_MODEL }}
      SPLITIK_LLM_TIMEOUT_SECONDS: ${{ vars.SPLITIK_LLM_TIMEOUT_SECONDS || '12' }}
      SPLITIK_PRIMARY_TIMEOUT_SECONDS: ${{ vars.SPLITIK_PRIMARY_TIMEOUT_SECONDS || '12' }}
      SPLITIK_FAST_CHAT_TIMEOUT_SECONDS: ${{ vars.SPLITIK_FAST_CHAT_TIMEOUT_SECONDS || '12' }}
      SPLITIK_INTENT_TIMEOUT_SECONDS: ${{ vars.SPLITIK_INTENT_TIMEOUT_SECONDS || '12' }}
      SPLITIK_VERIFICATION_TIMEOUT_SECONDS: ${{ vars.SPLITIK_VERIFICATION_TIMEOUT_SECONDS || '12' }}
      SPLITIK_ESCALATION_TIMEOUT_SECONDS: ${{ vars.SPLITIK_ESCALATION_TIMEOUT_SECONDS || '12' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate LLM smoke configuration
        run: |
          test -n "$SPLITIK_LLM_BASE_URL"
          test -n "$SPLITIK_LLM_API_KEY"
          test -n "$SPLITIK_PRIMARY_MODEL"
          test -n "$SPLITIK_FAST_CHAT_MODEL"
          test -n "$SPLITIK_INTENT_MODEL"

      - name: Benchmark configured Splitik LLM latency
        run: |
          python - <<'PY'
          import time
          import httpx
          from app.services import splitik_llm

          config = splitik_llm.load_config()
          roles = ["primary", "fast_chat", "intent"]
          print("role\tmodel\tattempt\telapsed_ms\tstatus")
          for role in roles:
              model = splitik_llm._model_for_role(config, role)
              timeout = splitik_llm._role_timeout(config, role)
              for attempt in range(1, 4):
                  payload = {
                      "model": model,
                      "messages": [
                          {"role": "system", "content": "Return a short health-check response. No private data."},
                          {"role": "user", "content": "health check"},
                      ],
                      "temperature": 0,
                  }
                  started = time.monotonic()
                  status = "ok"
                  try:
                      response = httpx.post(
                          splitik_llm._chat_completions_url(config.base_url),
                          headers={
                              "Authorization": f"Bearer {config.api_key}",
                              "Content-Type": "application/json",
                          },
                          json=payload,
                          timeout=timeout,
                      )
                      if response.status_code >= 400:
                          status = f"http_{response.status_code}"
                      else:
                          splitik_llm._extract_chat_content(response.json())
                  except httpx.TimeoutException:
                      status = "timeout"
                  except Exception as exc:
                      status = type(exc).__name__
                  elapsed_ms = round((time.monotonic() - started) * 1000, 2)
                  print(f"{role}\t{model}\t{attempt}\t{elapsed_ms}\t{status}")
          PY

      - name: Check configured Splitik LLM response SLA
        run: python -m pytest tests/test_splitik_llm_smoke.py -q

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs:
      - test
      - llm-smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      GRAFANA_ADMIN_PASSWORD_SECRET: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
      GRAFANA_PUBLIC_DOMAIN_DEFAULT: ${{ vars.GRAFANA_PUBLIC_DOMAIN }}
      SPLITIK_LLM_BASE_URL_SECRET: ${{ secrets.SPLITIK_LLM_BASE_URL || secrets.OCR_LLM_URL }}
      SPLITIK_LLM_API_KEY_SECRET: ${{ secrets.SPLITIK_LLM_API_KEY || secrets.OCR_LLM_AUTH_TOKEN }}
      SPLITIK_PRIMARY_MODEL_SECRET: ${{ secrets.SPLITIK_PRIMARY_MODEL || secrets.OCR_LLM_MODEL }}
      SPLITIK_FAST_CHAT_MODEL_VALUE: ${{ secrets.SPLITIK_FAST_CHAT_MODEL || vars.SPLITIK_FAST_CHAT_MODEL || 'deepseek-v4-flash' }}
      SPLITIK_INTENT_MODEL_VALUE: ${{ secrets.SPLITIK_INTENT_MODEL || vars.SPLITIK_INTENT_MODEL || 'deepseek-v4-flash' }}
      SPLITIK_VERIFICATION_MODEL_VALUE: ${{ secrets.SPLITIK_VERIFICATION_MODEL }}
      SPLITIK_ESCALATION_MODEL_VALUE: ${{ secrets.SPLITIK_ESCALATION_MODEL }}
      SPLITIK_LLM_TIMEOUT_SECONDS_VALUE: ${{ vars.SPLITIK_LLM_TIMEOUT_SECONDS || '12' }}
      SPLITIK_PRIMARY_TIMEOUT_SECONDS_VALUE: ${{ vars.SPLITIK_PRIMARY_TIMEOUT_SECONDS || '12' }}
      SPLITIK_FAST_CHAT_TIMEOUT_SECONDS_VALUE: ${{ vars.SPLITIK_FAST_CHAT_TIMEOUT_SECONDS || '12' }}
      SPLITIK_INTENT_TIMEOUT_SECONDS_VALUE: ${{ vars.SPLITIK_INTENT_TIMEOUT_SECONDS || '12' }}
      SPLITIK_VERIFICATION_TIMEOUT_SECONDS_VALUE: ${{ vars.SPLITIK_VERIFICATION_TIMEOUT_SECONDS || '12' }}
      SPLITIK_ESCALATION_TIMEOUT_SECONDS_VALUE: ${{ vars.SPLITIK_ESCALATION_TIMEOUT_SECONDS || '12' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_SSH_KEY"
          test -n "$DEPLOY_PATH"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        run: |
          SSH_PORT="${DEPLOY_PORT:-22}"
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -euo pipefail; mkdir -p '$DEPLOY_PATH'; find '$DEPLOY_PATH' -mindepth 1 ! -name .env -exec rm -rf {} +"

          tar \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='.venv' \
            --exclude='__pycache__' \
            --exclude='.pytest_cache' \
            --exclude='.ruff_cache' \
            -czf - . \
            | ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
              "set -euo pipefail; tar -xzf - -C '$DEPLOY_PATH'"

          splitik_env_file="$(mktemp)"
          append_splitik_env() {
            key="$1"
            value="$2"
            if [ -n "$value" ]; then
              printf '%s=%s\n' "$key" "$value" >> "$splitik_env_file"
            fi
          }
          append_splitik_env SPLITIK_LLM_BASE_URL "$SPLITIK_LLM_BASE_URL_SECRET"
          append_splitik_env SPLITIK_LLM_API_KEY "$SPLITIK_LLM_API_KEY_SECRET"
          append_splitik_env SPLITIK_PRIMARY_MODEL "$SPLITIK_PRIMARY_MODEL_SECRET"
          append_splitik_env SPLITIK_FAST_CHAT_MODEL "$SPLITIK_FAST_CHAT_MODEL_VALUE"
          append_splitik_env SPLITIK_INTENT_MODEL "$SPLITIK_INTENT_MODEL_VALUE"
          append_splitik_env SPLITIK_VERIFICATION_MODEL "$SPLITIK_VERIFICATION_MODEL_VALUE"
          append_splitik_env SPLITIK_ESCALATION_MODEL "$SPLITIK_ESCALATION_MODEL_VALUE"
          append_splitik_env SPLITIK_LLM_TIMEOUT_SECONDS "$SPLITIK_LLM_TIMEOUT_SECONDS_VALUE"
          append_splitik_env SPLITIK_PRIMARY_TIMEOUT_SECONDS "$SPLITIK_PRIMARY_TIMEOUT_SECONDS_VALUE"
          append_splitik_env SPLITIK_FAST_CHAT_TIMEOUT_SECONDS "$SPLITIK_FAST_CHAT_TIMEOUT_SECONDS_VALUE"
          append_splitik_env SPLITIK_INTENT_TIMEOUT_SECONDS "$SPLITIK_INTENT_TIMEOUT_SECONDS_VALUE"
          append_splitik_env SPLITIK_VERIFICATION_TIMEOUT_SECONDS "$SPLITIK_VERIFICATION_TIMEOUT_SECONDS_VALUE"
          append_splitik_env SPLITIK_ESCALATION_TIMEOUT_SECONDS "$SPLITIK_ESCALATION_TIMEOUT_SECONDS_VALUE"
          scp -i ~/.ssh/deploy_key -P "$SSH_PORT" "$splitik_env_file" "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/.splitik.env.incoming"
          rm -f "$splitik_env_file"

          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -euo pipefail; cd '$DEPLOY_PATH'; test -f .env; \
            if [ -f .splitik.env.incoming ]; then \
              while IFS='=' read -r KEY VALUE; do \
                [ -n \"\$KEY\" ] || continue; \
                grep -v \"^\${KEY}=\" .env > .env.tmp || true; printf '%s=%s\n' \"\$KEY\" \"\$VALUE\" >> .env.tmp; mv .env.tmp .env; \
              done < .splitik.env.incoming; \
              rm -f .splitik.env.incoming; \
            fi; \
            if ! grep -q '^METRICS_ACCESS_TOKEN=' .env; then printf 'METRICS_ACCESS_TOKEN=%s\n' \"\$(openssl rand -hex 32)\" >> .env; fi; \
            if ! grep -q '^GRAFANA_ADMIN_USER=' .env; then printf 'GRAFANA_ADMIN_USER=admin\n' >> .env; fi; \
            if [ -n '$GRAFANA_ADMIN_PASSWORD_SECRET' ]; then \
              grep -v '^GRAFANA_ADMIN_PASSWORD=' .env > .env.tmp || true; printf 'GRAFANA_ADMIN_PASSWORD=%s\n' '$GRAFANA_ADMIN_PASSWORD_SECRET' >> .env.tmp; mv .env.tmp .env; \
            elif ! grep -q '^GRAFANA_ADMIN_PASSWORD=' .env; then \
              printf 'GRAFANA_ADMIN_PASSWORD=%s\n' \"\$(openssl rand -base64 36 | tr -d '\n')\" >> .env; \
            fi; \
            if ! grep -q '^GRAFANA_BIND_ADDRESS=' .env; then printf 'GRAFANA_BIND_ADDRESS=127.0.0.1\n' >> .env; fi; \
            if ! grep -q '^GRAFANA_PUBLIC_DOMAIN=' .env; then printf 'GRAFANA_PUBLIC_DOMAIN=%s\n' \"\${GRAFANA_PUBLIC_DOMAIN_DEFAULT:-grafana.split-app.ru}\" >> .env; fi; \
            HOST_PORT=\$(sed -n 's/^HOST_PORT=//p' .env | tail -1); HOST_PORT=\${HOST_PORT:-8080}; \
            GRAFANA_HOST_PORT=\$(sed -n 's/^GRAFANA_HOST_PORT=//p' .env | tail -1); GRAFANA_HOST_PORT=\${GRAFANA_HOST_PORT:-3001}; \
            GRAFANA_PUBLIC_DOMAIN=\$(sed -n 's/^GRAFANA_PUBLIC_DOMAIN=//p' .env | tail -1); \
            GRAFANA_PUBLIC_PROXY_MODE=\$(sed -n 's/^GRAFANA_PUBLIC_PROXY_MODE=//p' .env | tail -1); GRAFANA_PUBLIC_PROXY_MODE=\${GRAFANA_PUBLIC_PROXY_MODE:-external}; \
            GRAFANA_PUBLIC_HTTPS_PORT=\$(sed -n 's/^GRAFANA_PUBLIC_HTTPS_PORT=//p' .env | tail -1); GRAFANA_PUBLIC_HTTPS_PORT=\${GRAFANA_PUBLIC_HTTPS_PORT:-443}; \
            PORTS_TO_CHECK=\"\$HOST_PORT \$GRAFANA_HOST_PORT\"; \
            if [ \"\$GRAFANA_PUBLIC_PROXY_MODE\" = caddy ] && [ -n \"\$GRAFANA_PUBLIC_DOMAIN\" ]; then PORTS_TO_CHECK=\"\$PORTS_TO_CHECK \$GRAFANA_PUBLIC_HTTPS_PORT\"; fi; \
            CURRENT_PROJECT_CONTAINERS=\$(docker ps --filter label=com.docker.compose.project=splitapp-backend --format '{{.ID}}' | tr '\n' ' '); \
            for PORT in \$PORTS_TO_CHECK; do \
              [ -n \"\$PORT\" ] || continue; \
              LISTENERS=\$(docker ps --filter publish=\"\$PORT\" --format '{{.ID}}' | tr '\n' ' '); \
              if [ -z \"\$LISTENERS\" ]; then \
                if ss -ltnH \"sport = :\$PORT\" | grep -q .; then echo \"Host port \$PORT is already used by a non-Compose process\"; exit 1; fi; \
                continue; \
              fi; \
              for CONTAINER in \$LISTENERS; do \
                case \" \$CURRENT_PROJECT_CONTAINERS \" in *\" \$CONTAINER \"*) ;; *) echo \"Host port \$PORT is already used by another container: \$CONTAINER\"; exit 1 ;; esac; \
              done; \
            done; \
            COMPOSE_PROFILES_VALUE=\"\"; \
            MONITORING_SERVICES=\"prometheus grafana alloy\"; \
            if [ \"\$GRAFANA_PUBLIC_PROXY_MODE\" = caddy ] && [ -n \"\$GRAFANA_PUBLIC_DOMAIN\" ]; then COMPOSE_PROFILES_VALUE=public-grafana; MONITORING_SERVICES=\"\$MONITORING_SERVICES grafana-public-proxy\"; fi; \
            COMPOSE_PROFILES=\"\$COMPOSE_PROFILES_VALUE\" docker compose up -d --build; \
            COMPOSE_PROFILES=\"\$COMPOSE_PROFILES_VALUE\" docker compose up -d --force-recreate \$MONITORING_SERVICES; \
            GRAFANA_ADMIN_PASSWORD=\$(sed -n 's/^GRAFANA_ADMIN_PASSWORD=//p' .env | tail -1); \
            GRAFANA_PASSWORD_RESET=0; \
            for attempt in \$(seq 1 20); do docker compose exec -T grafana grafana-cli admin reset-admin-password \"\$GRAFANA_ADMIN_PASSWORD\" && GRAFANA_PASSWORD_RESET=1 && break; sleep 3; done; \
            if [ \"\$GRAFANA_PASSWORD_RESET\" != 1 ]; then docker compose logs --tail=80 grafana; exit 1; fi; \
            for attempt in \$(seq 1 20); do curl -fsS \"http://127.0.0.1:\${HOST_PORT}/api/ping\" && exit 0; sleep 3; done; docker compose logs --tail=80 api; exit 1"
