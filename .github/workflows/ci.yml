name: Backend CI/CD

on:
  pull_request:
  push:
    branches:
      - main
      - "strongf/**"

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ruff
        run: make lint

      - name: Check formatting
        run: make format-check

      - name: Audit dependencies
        run: make security-audit

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: make test

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      GRAFANA_ADMIN_PASSWORD_SECRET: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
      GRAFANA_PUBLIC_DOMAIN_DEFAULT: ${{ vars.GRAFANA_PUBLIC_DOMAIN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_SSH_KEY"
          test -n "$DEPLOY_PATH"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        run: |
          SSH_PORT="${DEPLOY_PORT:-22}"
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -euo pipefail; mkdir -p '$DEPLOY_PATH'; find '$DEPLOY_PATH' -mindepth 1 ! -name .env -exec rm -rf {} +"

          tar \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='.venv' \
            --exclude='__pycache__' \
            --exclude='.pytest_cache' \
            --exclude='.ruff_cache' \
            -czf - . \
            | ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
              "set -euo pipefail; tar -xzf - -C '$DEPLOY_PATH'"

          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -euo pipefail; cd '$DEPLOY_PATH'; test -f .env; \
            if ! grep -q '^METRICS_ACCESS_TOKEN=' .env; then printf 'METRICS_ACCESS_TOKEN=%s\n' \"\$(openssl rand -hex 32)\" >> .env; fi; \
            if ! grep -q '^GRAFANA_ADMIN_USER=' .env; then printf 'GRAFANA_ADMIN_USER=admin\n' >> .env; fi; \
            if [ -n '$GRAFANA_ADMIN_PASSWORD_SECRET' ]; then \
              grep -v '^GRAFANA_ADMIN_PASSWORD=' .env > .env.tmp; printf 'GRAFANA_ADMIN_PASSWORD=%s\n' '$GRAFANA_ADMIN_PASSWORD_SECRET' >> .env.tmp; mv .env.tmp .env; \
            elif ! grep -q '^GRAFANA_ADMIN_PASSWORD=' .env; then \
              printf 'GRAFANA_ADMIN_PASSWORD=%s\n' \"\$(openssl rand -base64 36 | tr -d '\n')\" >> .env; \
            fi; \
            if ! grep -q '^GRAFANA_BIND_ADDRESS=' .env; then printf 'GRAFANA_BIND_ADDRESS=127.0.0.1\n' >> .env; fi; \
            if ! grep -q '^GRAFANA_PUBLIC_DOMAIN=' .env; then printf 'GRAFANA_PUBLIC_DOMAIN=%s\n' \"\${GRAFANA_PUBLIC_DOMAIN_DEFAULT:-grafana.split-app.ru}\" >> .env; fi; \
            HOST_PORT=\$(grep -E '^HOST_PORT=' .env | tail -1 | cut -d= -f2-); HOST_PORT=\${HOST_PORT:-8080}; \
            GRAFANA_HOST_PORT=\$(grep -E '^GRAFANA_HOST_PORT=' .env | tail -1 | cut -d= -f2-); GRAFANA_HOST_PORT=\${GRAFANA_HOST_PORT:-3001}; \
            GRAFANA_PUBLIC_DOMAIN=\$(grep -E '^GRAFANA_PUBLIC_DOMAIN=' .env | tail -1 | cut -d= -f2-); \
            GRAFANA_PUBLIC_HTTP_PORT=\$(grep -E '^GRAFANA_PUBLIC_HTTP_PORT=' .env | tail -1 | cut -d= -f2-); GRAFANA_PUBLIC_HTTP_PORT=\${GRAFANA_PUBLIC_HTTP_PORT:-80}; \
            GRAFANA_PUBLIC_HTTPS_PORT=\$(grep -E '^GRAFANA_PUBLIC_HTTPS_PORT=' .env | tail -1 | cut -d= -f2-); GRAFANA_PUBLIC_HTTPS_PORT=\${GRAFANA_PUBLIC_HTTPS_PORT:-443}; \
            PORTS_TO_CHECK=\"\$HOST_PORT \$GRAFANA_HOST_PORT\"; \
            if [ -n \"\$GRAFANA_PUBLIC_DOMAIN\" ]; then PORTS_TO_CHECK=\"\$PORTS_TO_CHECK \$GRAFANA_PUBLIC_HTTP_PORT \$GRAFANA_PUBLIC_HTTPS_PORT\"; fi; \
            CURRENT_PROJECT_CONTAINERS=\$(docker ps --filter label=com.docker.compose.project=splitapp-backend --format '{{.ID}}' | tr '\n' ' '); \
            for PORT in \$PORTS_TO_CHECK; do \
              [ -n \"\$PORT\" ] || continue; \
              LISTENERS=\$(docker ps --filter publish=\"\$PORT\" --format '{{.ID}}' | tr '\n' ' '); \
              if [ -z \"\$LISTENERS\" ]; then \
                if ss -ltnH \"sport = :\$PORT\" | grep -q .; then echo \"Host port \$PORT is already used by a non-Compose process\"; exit 1; fi; \
                continue; \
              fi; \
              for CONTAINER in \$LISTENERS; do \
                case \" \$CURRENT_PROJECT_CONTAINERS \" in *\" \$CONTAINER \"*) ;; *) echo \"Host port \$PORT is already used by another container: \$CONTAINER\"; exit 1 ;; esac; \
              done; \
            done; \
            COMPOSE_PROFILES_VALUE=\"\"; \
            MONITORING_SERVICES=\"prometheus grafana alloy\"; \
            if [ -n \"\$GRAFANA_PUBLIC_DOMAIN\" ]; then COMPOSE_PROFILES_VALUE=public-grafana; MONITORING_SERVICES=\"\$MONITORING_SERVICES grafana-public-proxy\"; fi; \
            COMPOSE_PROFILES=\"\$COMPOSE_PROFILES_VALUE\" docker compose up -d --build; \
            COMPOSE_PROFILES=\"\$COMPOSE_PROFILES_VALUE\" docker compose up -d --force-recreate \$MONITORING_SERVICES; \
            GRAFANA_ADMIN_PASSWORD=\$(grep -E '^GRAFANA_ADMIN_PASSWORD=' .env | tail -1 | cut -d= -f2-); \
            GRAFANA_PASSWORD_RESET=0; \
            for attempt in \$(seq 1 20); do docker compose exec -T grafana grafana-cli admin reset-admin-password \"\$GRAFANA_ADMIN_PASSWORD\" && GRAFANA_PASSWORD_RESET=1 && break; sleep 3; done; \
            if [ \"\$GRAFANA_PASSWORD_RESET\" != 1 ]; then docker compose logs --tail=80 grafana; exit 1; fi; \
            for attempt in \$(seq 1 20); do curl -fsS \"http://127.0.0.1:\${HOST_PORT}/api/ping\" && exit 0; sleep 3; done; docker compose logs --tail=80 api; exit 1"
