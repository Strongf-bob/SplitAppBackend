name: AI Test Failure Analysis

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

jobs:
  analyze-test-failure:
    name: Analyze Test Failure
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event.pull_request.draft == false
    env:
      OCR_LLM_URL: ${{ secrets.OCR_LLM_URL }}
      OCR_LLM_AUTH_TOKEN: ${{ secrets.OCR_LLM_AUTH_TOKEN }}
      OCR_LLM_MODEL: ${{ secrets.OCR_LLM_MODEL }}
      TEST_LOG_FILE: test-output.log
      PR_DIFF_FILE: pr-diff.patch
    steps:
      - name: Checkout pull request
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fetch base commit
        run: |
          git fetch --no-tags --prune --depth=1 origin \
            "${{ github.event.pull_request.base.sha }}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Save PR diff
        run: |
          git diff --no-ext-diff --unified=80 \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}" \
            > "$PR_DIFF_FILE"

      - name: Run tests
        id: tests
        shell: bash
        run: |
          set +e
          make test 2>&1 | tee "$TEST_LOG_FILE"
          test_status=${PIPESTATUS[0]}
          echo "exit_code=$test_status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload test failure context
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-test-failure-context
          path: |
            ${{ env.TEST_LOG_FILE }}
            ${{ env.PR_DIFF_FILE }}
          if-no-files-found: warn

      - name: Explain failed tests
        if: steps.tests.outputs.exit_code != '0'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TEST_EXIT_CODE: ${{ steps.tests.outputs.exit_code }}
        run: python3 .github/scripts/analyze_test_failure.py
