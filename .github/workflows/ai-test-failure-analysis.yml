name: AI Test Failure Analysis

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: ai-test-failure-analysis-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  collect-test-context:
    name: Collect Test Context
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event.pull_request.draft == false
    permissions:
      contents: read
    outputs:
      test_exit_code: ${{ steps.tests.outputs.exit_code }}
      analysis_code_changed: ${{ steps.diff.outputs.analysis_code_changed }}
    env:
      TEST_LOG_FILE: test-output.log
      PR_DIFF_FILE: pr-diff.patch
    steps:
      - name: Checkout pull request
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fetch base commit
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git fetch --no-tags --prune --depth=1 origin \
            "$BASE_SHA"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Save PR diff
        id: diff
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git diff --no-ext-diff --unified=80 \
            "$BASE_SHA" \
            "$HEAD_SHA" \
            > "$PR_DIFF_FILE"
          if git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -Eq '^\.github/(scripts/analyze_test_failure\.py|workflows/ai-test-failure-analysis\.yml)$'; then
            echo "analysis_code_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "analysis_code_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        id: tests
        shell: bash
        run: |
          set +e
          make test 2>&1 | tee "$TEST_LOG_FILE"
          test_status=${PIPESTATUS[0]}
          echo "exit_code=$test_status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload test failure context
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: ai-test-failure-context
          path: |
            ${{ env.TEST_LOG_FILE }}
            ${{ env.PR_DIFF_FILE }}
          if-no-files-found: warn

  explain-test-failure:
    name: Analyze Test Failure
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: collect-test-context
    if: needs.collect-test-context.result == 'success' && needs.collect-test-context.outputs.test_exit_code != '0'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout trusted analyzer
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Download test failure context
        uses: actions/download-artifact@v4
        with:
          name: ai-test-failure-context
          path: .

      - name: Explain failed tests
        if: needs.collect-test-context.outputs.analysis_code_changed != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TEST_EXIT_CODE: ${{ needs.collect-test-context.outputs.test_exit_code }}
          OCR_LLM_URL: ${{ secrets.OCR_LLM_URL }}
          OCR_LLM_AUTH_TOKEN: ${{ secrets.OCR_LLM_AUTH_TOKEN }}
          OCR_LLM_MODEL: ${{ secrets.OCR_LLM_MODEL }}
        run: python3 .github/scripts/analyze_test_failure.py
